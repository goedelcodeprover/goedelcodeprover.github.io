<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 350" width="960" height="350">
  <defs>
    <marker id="a-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748b"/></marker>
    <marker id="a-indigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#4f46e5"/></marker>
    <marker id="a-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#d97706"/></marker>
    <marker id="a-emerald" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#059669"/></marker>
    <marker id="a-pink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#db2777"/></marker>
    <marker id="a-violet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#7c3aed"/></marker>
    <style>
      text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="350" fill="white" rx="8"/>

  <!-- Title -->
  <rect x="28" y="18" width="5" height="24" rx="2.5" fill="#d97706"/>
  <text x="42" y="36" fill="#1e293b" font-size="20" font-weight="700">Stage 2: Hybrid Reinforcement Learning</text>
  <text x="42" y="54" fill="#94a3b8" font-size="11">On-policy GRPO for decomposition + Off-policy SFT replay for completion</text>

  <!-- SFT-S1 Model (left) -->
  <rect x="30" y="95" width="150" height="72" rx="14" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="105" y="124" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="700">SFT-S1 Model</text>
  <text x="105" y="144" text-anchor="middle" fill="#4f46e5" font-size="10" font-weight="500">unified policy π</text>

  <!-- Arrow to decompose -->
  <path d="M180,131 L228,131" fill="none" stroke="#4f46e5" stroke-width="1.8" marker-end="url(#a-indigo)"/>

  <!-- Decompose diamond -->
  <polygon points="265,103 305,131 265,159 225,131" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="265" y="128" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">Decompose</text>
  <text x="265" y="142" text-anchor="middle" fill="#7c3aed" font-size="8">rollout</text>

  <!-- ═══ On-Policy Region ═══ -->
  <rect x="325" y="72" width="600" height="95" rx="8" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <rect x="338" y="78" width="105" height="18" rx="4" fill="#fffbeb"/>
  <text x="345" y="90" fill="#d97706" font-size="11" font-weight="600">On-Policy (GRPO)</text>

  <!-- Arrow to trajectories -->
  <path d="M305,118 L370,118" fill="none" stroke="#d97706" stroke-width="1.8" marker-end="url(#a-amber)"/>

  <!-- Decomposition Trajectories -->
  <rect x="372" y="100" width="180" height="40" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.3"/>
  <text x="462" y="124" text-anchor="middle" fill="#1e293b" font-size="11.5" font-weight="600">Decomposition Trajectories</text>

  <!-- Arrow to compiler -->
  <path d="M552,120 L610,120" fill="none" stroke="#d97706" stroke-width="1.8" marker-end="url(#a-amber)"/>

  <!-- Compiler diamond -->
  <polygon points="648,96 682,120 648,144 614,120" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="648" y="116" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Lean 4</text>
  <text x="648" y="130" text-anchor="middle" fill="#7c3aed" font-size="8">Compiler</text>

  <!-- Arrow to GRPO -->
  <path d="M682,120 L738,120" fill="none" stroke="#d97706" stroke-width="1.8" marker-end="url(#a-amber)"/>

  <!-- GRPO Gradients -->
  <rect x="740" y="100" width="165" height="40" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="822" y="124" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="700">GRPO Gradients</text>
  <!-- Reward annotation -->
  <text x="822" y="152" text-anchor="middle" fill="#d97706" font-size="9" font-style="italic">reward = decomposition score R</text>
  <text x="822" y="163" text-anchor="middle" fill="#94a3b8" font-size="8">(continuous, dense signal)</text>

  <!-- ═══ Off-Policy Region ═══ -->
  <rect x="325" y="190" width="600" height="95" rx="8" fill="none" stroke="#db2777" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <rect x="338" y="196" width="125" height="18" rx="4" fill="#fdf2f8"/>
  <text x="345" y="208" fill="#db2777" font-size="11" font-weight="600">Off-Policy (SFT Replay)</text>

  <!-- Arrow from decompose down -->
  <path d="M265,159 L265,240 L370,240" fill="none" stroke="#059669" stroke-width="1.8" marker-end="url(#a-emerald)"/>

  <!-- Decomposed Lemmas -->
  <rect x="372" y="220" width="160" height="40" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="1.3"/>
  <text x="452" y="244" text-anchor="middle" fill="#1e293b" font-size="11.5" font-weight="600">Decomposed Lemmas</text>

  <!-- Arrow to Gemini -->
  <path d="M532,240 L585,240" fill="none" stroke="#059669" stroke-width="1.8" marker-end="url(#a-emerald)"/>

  <!-- Gemini Completion -->
  <rect x="587" y="220" width="165" height="40" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.3"/>
  <text x="669" y="236" text-anchor="middle" fill="#1e293b" font-size="11.5" font-weight="600">Gemini Completion</text>
  <text x="669" y="251" text-anchor="middle" fill="#64748b" font-size="9">teacher model · depth=20</text>

  <!-- Arrow to SFT gradients -->
  <path d="M752,240 L770,240" fill="none" stroke="#db2777" stroke-width="1.8" marker-end="url(#a-pink)"/>

  <!-- SFT Gradients -->
  <rect x="740" y="220" width="165" height="40" rx="10" fill="#fdf2f8" stroke="#db2777" stroke-width="2"/>
  <text x="822" y="244" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="700">SFT Gradients</text>
  <text x="822" y="272" text-anchor="middle" fill="#db2777" font-size="9" font-style="italic">stabilize completion ability</text>
  <text x="822" y="283" text-anchor="middle" fill="#94a3b8" font-size="8">(high-quality replay)</text>

  <!-- Feedback arrows (dashed) -->
  <path d="M822,100 L822,68 L105,68 L105,95" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#a-amber)"/>
  <path d="M822,260 L910,260 L910,305 L105,305 L105,167" fill="none" stroke="#db2777" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#a-pink)"/>

  <!-- Hybrid loss formula -->
  <rect x="18" y="178" width="190" height="38" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1" opacity="0.8"/>
  <text x="113" y="200" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="600" font-family="'SF Mono', 'Fira Code', monospace">𝒥 = 𝒥_GRPO + λ · 𝒥_SFT</text>
  <text x="113" y="228" text-anchor="middle" fill="#94a3b8" font-size="9">+ online lemma augmentation</text>
</svg>
